kind = "web"
previewPath = "/"
title = "FN Press Wire"
version = "1.0.0"
id = "artifacts/fn-press-wire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18967

[services.development]
run = "pnpm --filter @workspace/fn-press-wire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fn-press-wire", "run", "build" ]
publicDir = "artifacts/fn-press-wire/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18967"
BASE_PATH = "/"
